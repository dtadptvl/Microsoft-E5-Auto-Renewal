name: Keep Workflow Alive

on:
  schedule:
    # Chạy 1 lần duy nhất vào lúc 00:00 ngày mùng 1 hàng tháng
    - cron: '0 0 1 * *'
  workflow_dispatch: # Cho phép bạn bấm chạy thủ công nếu cần

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # (Quan trọng) Cấp quyền để bot được phép ghi đè file

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Tạo file rác và Auto Commit
        run: |
          # 1. Cấu hình danh tính cho Bot
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # 2. Ghi đè thời gian hiện tại vào một file text để tạo sự thay đổi
          echo "Luồng được duy trì vào ngày: $(date)" > keep_alive.txt
          
          # 3. Add và Commit
          git add keep_alive.txt
          # Lệnh || echo... giúp bỏ qua lỗi nếu không có gì thay đổi
          git commit -m "Auto commit để giữ GitHub Actions không bị tắt" || echo "Không có thay đổi để commit"
          
          # 4. Đẩy code lên repo
          git push
